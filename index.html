<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajathgiri Place</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Cinzel Decorative for the swash serif, Montserrat for clean sans-serif -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
</head>
<body>
    <!-- Top Navigation Bar -->
    <header>
        <div class="logo-area">
            <div class="logo-circle">
                <span class="r-mark">R</span>
            </div>
            <div class="logo-text">
                <h1>RAJATHAGIRI PALACE</h1>
                <p>TRADITION &bull; TASTE &bull; TRUST</p>
            </div>
        </div>
        
        <nav class="main-nav">
            <ul>
                <li class="active"><a href="#">Home</a></li>
                
            </ul>
        </nav>
        
        <div class="header-action">
            <a href="#" class="btn-order-now">
                <span class="icon-cloche">&#127858;</span> Order Now
            </a>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="hero-section">
        <div class="welcome-badge">
            <span class="diamond">&#10022;</span> WELCOME TO <span class="diamond">&#10022;</span>
        </div>
        
        <h2 class="hero-title">RAJATHAGIRI<br>PALACE</h2>
        
        <div class="ornate-divider">
            <div class="line"></div>
            <span class="flower">&#10043;</span>
            <div class="line"></div>
        </div>
        
        <p class="hero-subtitle">TRADITIONAL HERITAGE. EXQUISITE TASTE.</p>
        
        <div class="action-steps">
            <span class="flower-icon">&#10043;</span>
            <span class="step-text">SCAN <span class="dot">&bull;</span> ORDER <span class="dot">&bull;</span> PAY <span class="dot">&bull;</span> ENJOY</span>
            <span class="flower-icon">&#10043;</span>
        </div>
        
        <a href="menu.html" class="btn-start-ordering">
            ✻ START ORDERING ✻
        </a>
        
        <div class="table-card">
            <div class="table-icon">&#127869;</div>
            <p class="ordering-from"><span class="diamond">&#10022;</span> YOU ARE ORDERING FROM <span class="diamond">&#10022;</span></p>
            <h3 class="table-number">TABLE 5</h3>
        </div>
    </main>
</body>
</html>
